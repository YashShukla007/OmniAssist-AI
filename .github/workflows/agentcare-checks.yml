name: AgentCare Checks

on: [push]

permissions:
  id-token: write
  contents: read

concurrency:
  group: agentcare-checks-${{ github.ref }}
  cancel-in-progress: true

env:
  API_BASE: https://careerapi-production.krishnaik.in
  OIDC_AUDIENCE: https://career.krishnaik.in
  HACKATHON: agentcare-build-challenge-2026

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Request GitHub OIDC token
        id: oidc
        run: |
          TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=${{ env.OIDC_AUDIENCE }}" \
            | jq -r '.value')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Could not get an OIDC token. Check 'permissions: id-token: write'."
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Download checks
        env:
          OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
          SUBMISSION_TOKEN: ${{ secrets.SUBMISSION_TOKEN }}
        run: |
          HTTP=$(curl -sS -o checks.py -w '%{http_code}' \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "X-Submission-Token: $SUBMISSION_TOKEN" \
            "$API_BASE/api/ci/hackathons/$HACKATHON/checks.py")
          if [ "$HTTP" != "200" ]; then
            echo "::error::Could not download checks (HTTP $HTTP): $(cat checks.py)"
            exit 1
          fi

      - name: Run checks
        env:
          WEBHOOK_URL: ${{ env.API_BASE }}/api/ci/report
          SUBMISSION_TOKEN: ${{ secrets.SUBMISSION_TOKEN }}
          OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
        run: python checks.py
